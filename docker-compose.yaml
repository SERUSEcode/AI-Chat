services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-backend
    volumes:
      - ollama_data:/root/.ollama:Z
    ports:
      - "11434:11434"
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull smollm2:135m && wait"

  frontend:
    build: 
      context: ./interface  # Make sure this is lowercase!
      dockerfile: Dockerfile
    container_name: chat-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_OLLAMA_URL=http://localhost:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
